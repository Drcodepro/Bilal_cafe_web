<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>Bilal Kebabs & Biryani — Mount Road | Order Online</title>
    <meta name="description" content="Order authentic Hyderabadi Biryani, Kebabs, and more from Bilal Kebabs & Biryani, Mount Road. Fresh ingredients, traditional recipes, delivered to your door." />
    <meta name="theme-color" content="#3A2D27" />

    <!-- Open Graph -->
    <meta property="og:title" content="Bilal Kebabs & Biryani — Mount Road" />
    <meta property="og:description" content="Authentic Hyderabadi Biryani & Kebabs. Order online for dine-in or delivery." />
    <meta property="og:type" content="restaurant" />
    <meta property="og:image" content="/logo.png" />

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self';
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Security: Prevent clickjacking -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Security: HTTPS enforcement (production) -->
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains" />

    <!-- Referrer policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Apple mobile web app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bilal Cafe" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
